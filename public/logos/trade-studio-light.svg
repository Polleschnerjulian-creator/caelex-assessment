<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 290 130"
  fill="none"
>
  <!-- Caelex Trade Studio wordmark — light-mode variant.
       Mark: 3-block pyramid in indigo-600 (#4f46e5). Bottom-up
       ascending taper represents classification cascade (broad
       item base → narrow license-restricted top) and the
       compliance-layer stack (items → operations → licenses).
       Wordmark in near-black for crisp contrast on light bg.
       Replace if/when a hand-crafted brand asset arrives. -->
  <g fill="#4f46e5">
    <rect x="0" y="58" width="80" height="22" />
    <rect x="15" y="30" width="50" height="22" />
    <rect x="29" y="2" width="22" height="22" />
  </g>
  <text
    x="0"
    y="116"
    font-family="Inter, -apple-system, system-ui, sans-serif"
    font-weight="600"
    font-size="22"
    fill="#111827"
    letter-spacing="-0.6"
  >
    caelex trade studio
  </text>
</svg>
