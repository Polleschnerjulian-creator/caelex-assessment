<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 290 130"
  fill="none"
>
  <!-- Caelex Trade Studio wordmark — dark-mode variant.
       Mark: 3-block pyramid in indigo-400 (#818cf8) — lighter on
       dark surfaces for legibility, matches --trade-accent in
       the dark-theme token palette. Wordmark in pure white. -->
  <g fill="#818cf8">
    <rect x="0" y="58" width="80" height="22" />
    <rect x="15" y="30" width="50" height="22" />
    <rect x="29" y="2" width="22" height="22" />
  </g>
  <text
    x="0"
    y="116"
    font-family="Inter, -apple-system, system-ui, sans-serif"
    font-weight="600"
    font-size="22"
    fill="#FFFFFF"
    letter-spacing="-0.6"
  >
    caelex trade studio
  </text>
</svg>
