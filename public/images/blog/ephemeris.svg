<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <rect width="1200" height="675" fill="#030712"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%">
    <stop offset="0%" stop-color="#10B981" stop-opacity="0.08"/>
    <stop offset="70%" stop-color="#10B981" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="600" cy="338" rx="400" ry="300" fill="url(#glow)"/>

  <!-- Forecast trajectory line -->
  <defs>
    <linearGradient id="lineGrad" x1="250" y1="0" x2="950" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="lineGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Confidence band -->
  <path d="M250,200 C400,210 550,280 700,380 L750,420 L950,480 L950,520 L750,470 L700,430 C550,340 400,270 250,250 Z" fill="#10B981" opacity="0.04"/>

  <!-- Main curve -->
  <path d="M250,225 C400,240 550,310 700,405 L950,500" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#lineGlow)"/>

  <!-- Threshold dashed line -->
  <line x1="200" y1="430" x2="1000" y2="430" stroke="#EF4444" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Crossing point pulse -->
  <circle cx="735" cy="430" r="10" fill="#EF4444" opacity="0.15"/>
  <circle cx="735" cy="430" r="5" fill="#EF4444" opacity="0.6"/>

  <!-- Start point -->
  <circle cx="250" cy="225" r="4" fill="#10B981"/>

  <!-- Small satellite shape -->
  <g transform="translate(230, 205) scale(0.4)" opacity="0.3">
    <rect x="-20" y="-4" width="40" height="8" rx="2" fill="#9CA3AF"/>
    <rect x="-8" y="-16" width="16" height="32" rx="2" fill="#6B7280"/>
    <rect x="-40" y="-2" width="20" height="4" rx="1" fill="#4B5563"/>
    <rect x="20" y="-2" width="20" height="4" rx="1" fill="#4B5563"/>
  </g>
</svg>